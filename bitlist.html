<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />

<style>
@import url(https://fonts.googleapis.com/css2?family=Anton&family=Roboto:700&display=swap);

* { box-sizing: border-box; }

html, body {
  height: 100%;
  width: 100%;
  margin: 0;
  background: transparent;
  overflow: hidden;
}

body {
  font-family: 'Roboto', sans-serif;
  font-weight: 700;
  font-size: 20px;
  line-height: 1.5em;
  color: #fff;
  text-shadow: 0 0 1px #000, 0 0 2px #000;
}

/* CONTENITORE: Ora si stringe sul contenuto */
#bits-log {
  position: absolute;
  top: 10px;
  left: 10px;
  width: max-content; /* Larghezza minima basata sul testo */
  min-width: 200px;    /* Opzionale: evita che sia troppo stretto se c'è poco testo */
  padding: 8px;
  background: rgba(88,7,7,0.7);
  border-radius: 14px;
  display: flex;
  flex-direction: column;
}

/* BORDO */
#bits-log::before {
  content:"";
  position:absolute;
  inset:0;
  border-radius:14px;
  padding:2px;
  background: linear-gradient(
    135deg,
    rgba(255,255,255,0.95),
    rgba(255,255,255,0.45),
    rgba(255,255,255,0.95)
  );
  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
          mask-composite: exclude;
  pointer-events:none;
}

/* HEADER */
#bits-header {
  font-family:'Anton', sans-serif;
  font-size:1.4em;
  letter-spacing:1px;
  background: linear-gradient(to bottom, rgba(255,255,255,0.95), rgba(240,240,240,0.95));
  color:#831d1c;
  text-shadow:none;
  padding:4px 10px;
  margin-bottom:10px;
  border-radius:8px;
  text-align:center;
}

/* LISTA */
#bits-inner {
  display:flex;
  flex-direction:column;
  gap:8px;
}

/* RIGHE: Larghezza automatica e no a capo */
.bits-row {
  display: grid;
  grid-template-columns: auto auto; /* Stringe le colonne al minimo */
  justify-content: start;
  align-items: center;
  gap: 10px;
  padding: 6px 12px;
  border-radius: 10px;
  background: rgba(0,0,0,0.15);
  border: 1px solid rgba(255,255,255,0.12);
  white-space: nowrap; /* Forza tutto su una riga */
}

.bits-amount {
  font-family: 'Anton', sans-serif;
  font-size: 1.25em;
  letter-spacing: .5px;
  color: #fff;
  min-width: 45px; /* Mantiene un minimo di allineamento per i numeri */
}

.bits-desc {
  font-size: 0.9em;
}

.bits-desc::before {
  content: "— ";
  opacity: .9;
}
</style>
</head>

<body>

<div id="bits-log">
  <div id="bits-header">BITS</div>

  <div id="bits-inner">
    <div class="bits-row">
      <div class="bits-amount">30</div>
      <div class="bits-desc"><i>"Cairo Vattene"</i></div>
    </div>

    <div class="bits-row">
      <div class="bits-amount">50</div>
      <div class="bits-desc">Fischi</div>
    </div>

    <div class="bits-row">
      <div class="bits-amount">100</div>
      <div class="bits-desc">Leggo Messaggio</div>
    </div>

    <div class="bits-row">
      <div class="bits-amount">200</div>
      <div class="bits-desc"><i>"Chi non salta è un gobbo"</i></div>
    </div>

    <div class="bits-row">
      <div class="bits-amount">1000</div>
      <div class="bits-desc">Messaggio in Live per 3'</div>
    </div>
  </div>
</div>

</body>
</html>
