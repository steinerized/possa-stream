<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<style>
@import url(https://fonts.googleapis.com/css2?family=Anton&family=Roboto:wght@700&display=swap);

*{ box-sizing:border-box; }
html,body{
  height:100%; width:100%;
  margin:0; overflow:hidden;
  background:transparent;
}

body{
  font-family:'Roboto',sans-serif;
  font-weight:700;
  font-size: clamp(12px, 1.1vw, 18px); /* Leggermente ridotto per la riga singola */
  line-height: 1.25em;
  color:#fff;
  text-shadow:0 0 1px #000, 0 0 2px #000;
  position:relative;
}

/* PANEL */
#panel{
  position:absolute;
  inset:0;
  padding:8px 12px;
  background:rgba(88,7,7,0.70);
  border-radius:14px;
  display: flex;
  align-items: center; /* Centra tutto verticalmente nel pannello */
}

/* BORDER */
#panel::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:14px;
  padding:2px;
  background:linear-gradient(135deg, rgba(255,255,255,0.95), rgba(255,255,255,0.45), rgba(255,255,255,0.95));
  -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;
  mask-composite:exclude;
  pointer-events:none;
}

/* GRID FORZATA: 5 COLONNE, 1 RIGA */
#grid{
  width: 100%;
  display: grid;
  grid-template-columns: repeat(5, 1fr); 
  grid-template-rows: 1fr;
  gap: 10px;
  align-items: center;
}

.col{
  min-width: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 4px;
}

/* HEADER */
.header{
  font-family:'Anton',sans-serif;
  font-size: clamp(10px, 1.4vw, 20px);
  letter-spacing:1px;
  background:linear-gradient(to bottom, rgba(255,255,255,0.95), rgba(240,240,240,0.95));
  color:#831d1c;
  text-shadow:none;
  padding:5px 8px;
  border-radius:8px;
  text-align:center;
  white-space: nowrap;
}

/* ROW */
.row{
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}

/* LABEL */
.label{
  font-family:'Anton',sans-serif;
  font-size: clamp(11px, 1.2vw, 17px);
  text-align: right;
  flex: 0 1 auto;
  min-width: 0;
}

/* DESC */
.desc{
  font-size: clamp(11px, 1.1vw, 16px);
  flex: 1 1 auto;
  min-width: 0;
  opacity: 0.95;
}
.desc::before{ content:"— "; }

.empty{ flex: 1; }

</style>
</head>
<body>

  <div id="panel">
    <div id="grid">

      <div class="col">
        <div class="header">ALLUNGA LA LIVE!</div>
      </div>

      <div class="col">
        <div class="row">
          <div class="label">FOLLOW</div>
          <div class="desc">+1'</div>
        </div>
      </div>

      <div class="col">
        <div class="row">
          <div class="label">100 BIT</div>
          <div class="desc">+3'</div>
        </div>
      </div>

      <div class="col">
      <div class="row">
          <div class="label">100 BIT</div>
          <div class="desc">+3'</div>
          </div>
      </div>

      <div class="col">
        <div class="row">
          <div class="label">SUB</div>
          <div class="desc">+5'</div>
          </div>
      </div>

    </div>
  </div>

</body>
</html>
